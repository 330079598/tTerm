<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tTerm</title>
    <style>
      /* Splash screen styles - loaded immediately */
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        /* Default theme background - will be overridden by preloadTheme */
        background-color: hsl(220 13% 12%);
      }

      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      #splash-screen::before {
        content: "";
        position: absolute;
        inset: 0;
        /* Semi-transparent overlay for depth */
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
      }

      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .splash-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 32px;
        border-radius: 16px;
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.5),
          0 10px 10px -5px rgba(0, 0, 0, 0.4);
        animation: pulse 2s ease-in-out infinite;
      }

      .splash-progress {
        position: relative;
        width: 192px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 9999px;
        overflow: hidden;
      }

      .splash-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, rgba(59, 130, 246, 0.8), #3b82f6);
        border-radius: 9999px;
        animation: progress 1.5s ease-in-out infinite;
      }

      .splash-text {
        margin-top: 16px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.85;
          transform: scale(0.96);
        }
      }

      @keyframes progress {
        0% {
          width: 0%;
          margin-left: 0%;
        }
        50% {
          width: 50%;
          margin-left: 25%;
        }
        100% {
          width: 0%;
          margin-left: 100%;
        }
      }
    </style>
  </head>

  <body>
    <!-- Splash screen - shown immediately -->
    <div id="splash-screen">
      <div class="splash-content">
        <img src="/app-icon.png" alt="tTerm" class="splash-logo" />
        <div class="splash-progress">
          <div class="splash-progress-bar"></div>
        </div>
        <p class="splash-text">Loading tTerm...</p>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
