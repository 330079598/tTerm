name: Release (dev-beta)

on:
  push:
    branches:
      - dev-beta
  workflow_dispatch:

concurrency:
  group: release-dev-beta
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      beta_tag: ${{ steps.version.outputs.beta_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          LATEST_BETA=$(
            git ls-remote --refs --tags origin "v${VERSION}-beta.*" |
              while read -r _ ref; do
                beta_number="${ref#refs/tags/v${VERSION}-beta.}"
                if [[ "$beta_number" =~ ^[0-9]+$ ]]; then
                  echo "$beta_number"
                fi
              done |
              sort -n |
              tail -1
          )
          NEXT_BETA=$(( ${LATEST_BETA:-0} + 1 ))

          echo "beta_tag=v${VERSION}-beta.${NEXT_BETA}" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.beta_tag }}
          releaseName: ${{ needs.prepare.outputs.beta_tag }}
          releaseBody: 'Development build from dev-beta branch'
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

  publish-beta-manifest:
    needs:
      - prepare
      - release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download updater manifest from beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.beta_tag }}
        shell: bash
        run: |
          mkdir -p updater-manifest
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json \
            --dir updater-manifest \
            --clobber

      - name: Checkout GitHub Pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$REMOTE" github-pages >/dev/null 2>&1; then
            git clone --branch github-pages --depth 1 "$REMOTE" pages
          else
            git clone --depth 1 "$REMOTE" pages
            cd pages
            git checkout --orphan github-pages
            git rm -rf .
            touch .nojekyll
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .nojekyll
            git commit -m "Initialize GitHub Pages branch"
            git push origin github-pages
          fi

      - name: Publish beta-dev updater manifest
        shell: bash
        run: |
          mkdir -p pages/beta-dev
          cp updater-manifest/latest.json pages/beta-dev/latest.json
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beta-dev/latest.json
          if git diff --cached --quiet; then
            echo "beta-dev/latest.json is already up to date."
            exit 0
          fi
          git commit -m "Update beta-dev updater manifest to ${{ needs.prepare.outputs.beta_tag }}"
          git push origin github-pages
