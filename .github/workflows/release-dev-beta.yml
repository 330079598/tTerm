name: Release (dev-beta)

on:
  push:
    branches:
      - dev-beta
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      beta_tag: ${{ steps.version.outputs.beta_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "beta_tag=v${VERSION}-beta.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.beta_tag }}
          releaseName: ${{ needs.prepare.outputs.beta_tag }}
          releaseBody: 'Development build from dev-beta branch'
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

  publish-beta-manifest:
    needs:
      - prepare
      - release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Download updater manifest from beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.beta_tag }}
        shell: bash
        run: |
          mkdir -p updater-manifest
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json \
            --dir updater-manifest \
            --clobber

      - name: Checkout updater manifest repository
        uses: actions/checkout@v4
        with:
          repository: 330079598/tTerm-updates
          token: ${{ secrets.TTERM_UPDATES_TOKEN }}
          path: tTerm-updates

      - name: Publish beta-dev updater manifest
        shell: bash
        run: |
          mkdir -p tTerm-updates/beta-dev
          cp updater-manifest/latest.json tTerm-updates/beta-dev/latest.json
          cd tTerm-updates
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beta-dev/latest.json
          if git diff --cached --quiet; then
            echo "beta-dev/latest.json is already up to date."
            exit 0
          fi
          git commit -m "Update beta-dev updater manifest to ${{ needs.prepare.outputs.beta_tag }}"
          git push
